version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: lifeassist-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20
    container_name: lifeassist-backend
    working_dir: /app
    command: sh -c "npm install && npm run seed && npm run dev"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    image: node:20
    container_name: lifeassist-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
